# ═══════════════════════════════════════════════════════════════
#  AKD — Acts of Kindness Daily — Full Stack
# ═══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: akd
      POSTGRES_USER: akd
      POSTGRES_PASSWORD: akd_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akd"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Flask Backend API ──────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_CONFIG: production
      DATABASE_URL: postgresql://akd:akd_dev_password@postgres:5432/akd
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production-to-a-real-secret
      JWT_SECRET_KEY: change-this-jwt-secret-in-production
      AI_VERIFIER_TYPE: mock
      UPLOAD_FOLDER: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Admin Panel (static file server) ───────────────────────
  admin:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./admin:/usr/share/nginx/html:ro
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
